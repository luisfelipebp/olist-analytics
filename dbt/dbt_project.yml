name: 'olist_analytics'
version: '1.0.0'
config-version: 2

profile: 'olist_analytics'

model-paths: ["models"]
macro-paths: ["macros"]
target-path: "target"

models:
  olist_analytics:

    staging:
      +schema: staging
      +materialized: view

    intermediate:
      +schema: intermediate
      +materialized: view

    marts:
      +schema: marts
      +materialized: table

tests:
  olist_analytics:
    +schema: audit 
    +store_failures: true